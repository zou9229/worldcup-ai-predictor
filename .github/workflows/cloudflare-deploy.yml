name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Restore production config
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
          WRANGLER_JSONC: ${{ secrets.WRANGLER_JSONC }}
        run: |
          test -n "$ENV_PRODUCTION" || (echo "Missing ENV_PRODUCTION secret" && exit 1)
          test -n "$WRANGLER_JSONC" || (echo "Missing WRANGLER_JSONC secret" && exit 1)
          printf '%s\n' "$ENV_PRODUCTION" > .env.production
          printf '%s\n' "$WRANGLER_JSONC" > wrangler.jsonc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        run: pnpm run cf:deploy
